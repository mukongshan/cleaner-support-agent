# 测试环境专用配置
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop  # 测试时每次重新创建表
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  h2:
    console:
      enabled: false  # 测试时不需要H2控制台

# 测试环境禁用AI服务调用
app:
  ai:
    base-url:
    api-key:
  cors:
    allowed-origins: http://localhost:5173
  media:
    upload-dir: ./test-uploads
  image-recognition:
    qwen-vl:
      api-url: https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation
      api-key:   # 必填：从阿里云DashScope获取
      model: qwen-vl-plus  # 可选：qwen-vl-max, qwen-vl-plus
      timeout: 30000
      max-retries: 3
    upload-dir: ./data/images  # 图片存储目录
    max-file-size: 10485760    # 10MB
    allowed-formats: jpg,jpeg,png,webp