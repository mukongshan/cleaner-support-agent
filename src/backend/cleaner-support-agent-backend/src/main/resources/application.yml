spring:
  application:
    name: cleaner-support-agent-backend

  profiles:
    # 默认本地开发环境；如需切换可通过环境变量 SPRING_PROFILES_ACTIVE=prod
    active: ${SPRING_PROFILES_ACTIVE:dev}
    # 包含本地配置文件（如果存在）
    include:
      - local

  # 数据库（默认 MySQL；也可通过环境变量覆盖为 Postgres）
  datasource:
    # 为避免在仓库中泄露连接信息，这里不再提供默认值，请在
    # - 环境变量 SPRING_DATASOURCE_*
    # - 或 application-local.yml 中进行配置
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
    show-sql: ${SPRING_JPA_SHOW_SQL:false}

  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:25MB}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    org.springframework.web: ${LOG_LEVEL_SPRING_WEB:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_HIBERNATE_SQL:WARN}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:when_authorized}

# 业务自定义配置（目前代码未使用，先预留，后续可直接接入）
app:
  cors:
    # 前端地址；多地址用逗号分隔，后续你实现 CORS 配置类时可读取这里
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  dify:
    # Dify AI 平台配置
    base-url: ${APP_DIFY_BASE_URL:https://dify.seec.seecoder.cn/v1}
    api-key: ${APP_DIFY_API_KEY:}
    # 用户标识前缀，避免与Dify其他应用的用户冲突
    user-prefix: ${APP_DIFY_USER_PREFIX:__CSA_developer_}
    # SSE连接超时时间（毫秒）
    timeout: ${APP_DIFY_TIMEOUT:60000}
  media:
    upload-dir: ${APP_MEDIA_UPLOAD_DIR:./data/uploads}

  image-recognition:
    # Qwen-VL API配置
    qwen-vl:
      api-url: ${QWEN_VL_API_URL:https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation}
      api-key: ${QWEN_VL_API_KEY:}
      model: ${QWEN_VL_MODEL:qwen-vl-plus}  # qwen-vl-max, qwen-vl-plus
      timeout: ${QWEN_VL_TIMEOUT:30000}    # 30秒超时
      max-retries: ${QWEN_VL_MAX_RETRIES:3}
    # 图片存储配置
    upload-dir: ${IMAGE_UPLOAD_DIR:./data/images}
    max-file-size: ${IMAGE_MAX_SIZE:10485760}  # 10MB
    allowed-formats: ${IMAGE_ALLOWED_FORMATS:jpg,jpeg,png,webp}
  jwt:
    # JWT密钥（请在本地文件 application-local.yml 或环境变量中配置）
    secret: ${APP_JWT_SECRET}
    # Token过期时间（单位：秒，默认7天）
    expiration: ${APP_JWT_EXPIRATION:604800}

# Seafile 配置
seafile:
  # 为避免在仓库中泄露存储配置，这里不再提供默认值，请在
  # - 环境变量 SEAFILE_*
  # - 或 application-local.yml 中进行配置
  server-url: ${SEAFILE_SERVER_URL}
  repo-token: ${SEAFILE_REPO_TOKEN}
  repo-id: ${SEAFILE_REPO_ID}
  repo-password: ${SEAFILE_REPO_PASSWORD}

---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    org.springframework.web: ${LOG_LEVEL_SPRING_WEB:DEBUG}

---
spring:
  config:
    activate:
      on-profile: prod

server:
  # 生产建议由反向代理/网关设置；这里保留占位
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
